name: Windows automatic release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: worker-rest-calendar-production-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-2025
    timeout-minutes: 60
    env:
      GH_TOKEN: ${{ github.token }}
      MINIMUM_VERSION: 0.1.11
    steps:
      - name: Checkout full history
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve release version and idempotency
        id: version
        shell: pwsh
        run: |
          $latestJson = gh api "repos/$env:GITHUB_REPOSITORY/releases/latest" 2>$null
          $latestTag = $null
          if ($LASTEXITCODE -eq 0) {
            $latest = $latestJson | ConvertFrom-Json
            $latestTag = $latest.tag_name
            if ($latest.target_commitish -eq $env:GITHUB_SHA) {
              "SKIP_RELEASE=true" | Out-File -FilePath $env:GITHUB_ENV -Append
              "skip=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
              Write-Host "Current commit is already Latest Release $latestTag"
              exit 0
            }
          }
          $arguments = @('scripts/next_semver.py', '--minimum', $env:MINIMUM_VERSION)
          if ($latestTag) { $arguments += @('--latest', $latestTag) }
          $version = (& python @arguments).Trim()
          if ($LASTEXITCODE -ne 0 -or -not $version) {
            throw 'Unable to resolve the next release version.'
          }
          $tag = "v$version"
          $buildNumber = [int]($version.Split('.')[-1])
          $assetBase = "worker-rest-calendar-Setup-Windows-x64-$tag"
          $assetName = "$assetBase.exe"
          "SKIP_RELEASE=false" | Out-File -FilePath $env:GITHUB_ENV -Append
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          "TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Append
          "BUILD_NUMBER=$buildNumber" | Out-File -FilePath $env:GITHUB_ENV -Append
          "ASSET_BASE=$assetBase" | Out-File -FilePath $env:GITHUB_ENV -Append
          "ASSET_NAME=$assetName" | Out-File -FilePath $env:GITHUB_ENV -Append
          "ASSET_PATH=build/installer/$assetName" | Out-File -FilePath $env:GITHUB_ENV -Append
          "CHECKSUM_PATH=build/installer/$assetName.sha256" | Out-File -FilePath $env:GITHUB_ENV -Append
          "skip=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Test version resolver
        if: env.SKIP_RELEASE != 'true'
        run: python scripts/next_semver.py --self-test

      - name: Set up Flutter 3.38.8
        if: env.SKIP_RELEASE != 'true'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.38.8
          channel: stable
          cache: true

      - name: Resolve Flutter dependencies
        if: env.SKIP_RELEASE != 'true'
        run: flutter pub get

      - name: Check formatting
        if: env.SKIP_RELEASE != 'true'
        run: dart format --output=none --set-exit-if-changed lib test integration_test

      - name: Static analysis
        if: env.SKIP_RELEASE != 'true'
        run: flutter analyze

      - name: Run unit and widget tests
        if: env.SKIP_RELEASE != 'true'
        run: flutter test -r compact

      - name: Run Windows integration test
        if: env.SKIP_RELEASE != 'true'
        run: flutter test integration_test -d windows -r compact

      - name: Build Windows release
        if: env.SKIP_RELEASE != 'true'
        run: flutter build windows --release --build-name "$env:VERSION" --build-number "$env:BUILD_NUMBER"

      - name: Verify runtime bundle
        if: env.SKIP_RELEASE != 'true'
        shell: pwsh
        run: |
          $bundle = 'build/windows/x64/runner/Release'
          $required = @(
            "$bundle/worker_rest_calendar.exe",
            "$bundle/worker_rest_calendar_updater.exe",
            "$bundle/data/app.so",
            "$bundle/flutter_windows.dll"
          )
          foreach ($file in $required) {
            if (-not (Test-Path -LiteralPath $file)) { throw "Missing runtime file: $file" }
            if ((Get-Item -LiteralPath $file).Length -le 0) { throw "Empty runtime file: $file" }
          }
          $runtimeVersion = (Get-Item "$bundle/worker_rest_calendar.exe").VersionInfo.ProductVersion
          $expectedRuntimeVersion = "$env:VERSION+$env:BUILD_NUMBER"
          if ($runtimeVersion -ne $expectedRuntimeVersion) {
            throw "Runtime version $runtimeVersion does not match $env:VERSION"
          }

      - name: Build Inno Setup installer
        if: env.SKIP_RELEASE != 'true'
        shell: pwsh
        run: |
          $iscc = (Get-Command ISCC.exe -ErrorAction SilentlyContinue).Source
          if (-not $iscc) { $iscc = 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe' }
          if (-not (Test-Path -LiteralPath $iscc)) { throw 'Inno Setup 6 is unavailable.' }
          & $iscc "/DAppVersion=$env:VERSION" "/DOutputBaseFilename=$env:ASSET_BASE" 'windows/installer/worker_rest_calendar.iss'
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed with $LASTEXITCODE" }
          if (-not (Test-Path -LiteralPath $env:ASSET_PATH)) { throw "Missing $env:ASSET_PATH" }

      - name: Verify installer and create checksum
        if: env.SKIP_RELEASE != 'true'
        shell: pwsh
        run: |
          $asset = Get-Item -LiteralPath $env:ASSET_PATH
          if ($asset.Length -lt 1000000) { throw "Installer is unexpectedly small: $($asset.Length)" }
          $version = $asset.VersionInfo.ProductVersion
          if (-not $version.StartsWith($env:VERSION)) {
            throw "Installer version $version does not match $env:VERSION"
          }
          $signature = Get-AuthenticodeSignature -LiteralPath $asset.FullName
          if ($signature.Status -notin @('NotSigned', 'Valid')) {
            throw "Unexpected Authenticode status: $($signature.Status)"
          }
          $sha = (Get-FileHash -Algorithm SHA256 -LiteralPath $asset.FullName).Hash.ToLowerInvariant()
          "$sha  $env:ASSET_NAME" | Set-Content -LiteralPath $env:CHECKSUM_PATH -Encoding ascii -NoNewline
          "ASSET_SIZE=$($asset.Length)" | Out-File -FilePath $env:GITHUB_ENV -Append
          "ASSET_SHA256=$sha" | Out-File -FilePath $env:GITHUB_ENV -Append
          "SIGNATURE_STATUS=$($signature.Status)" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Create draft Release and upload assets
        if: env.SKIP_RELEASE != 'true'
        id: create_release
        shell: pwsh
        run: |
          $notes = @"
          工作日历 $env:VERSION

          - Windows x64 当前用户安装包
          - 自动更新资产名与 SHA-256 校验契约已固定
          - Authenticode: $env:SIGNATURE_STATUS（未签名时可能触发 SmartScreen）
          "@
          gh release create $env:TAG $env:ASSET_PATH $env:CHECKSUM_PATH --draft --verify-tag=false --target $env:GITHUB_SHA --title "工作日历 $env:VERSION" --notes $notes
          if ($LASTEXITCODE -ne 0) { throw 'Draft Release creation failed.' }
          "created=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          $matches = @(gh api "repos/$env:GITHUB_REPOSITORY/releases?per_page=100" | ConvertFrom-Json | Where-Object {
            $_.tag_name -eq $env:TAG -and $_.draft -and $_.target_commitish -eq $env:GITHUB_SHA
          })
          if ($matches.Count -ne 1) { throw "Expected one new draft, found $($matches.Count)." }
          "RELEASE_ID=$($matches[0].id)" | Out-File -FilePath $env:GITHUB_ENV -Append
          "release_id=$($matches[0].id)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Verify draft assets remotely
        if: env.SKIP_RELEASE != 'true'
        shell: pwsh
        run: |
          $release = gh api "repos/$env:GITHUB_REPOSITORY/releases/$env:RELEASE_ID" | ConvertFrom-Json
          if (-not $release.draft -or $release.prerelease) { throw 'Release is not the expected draft.' }
          if ($release.target_commitish -ne $env:GITHUB_SHA) { throw 'Release target commit mismatch.' }
          foreach ($name in @($env:ASSET_NAME, "$env:ASSET_NAME.sha256")) {
            $matches = @($release.assets | Where-Object { $_.name -ceq $name })
            if ($matches.Count -ne 1) { throw "Asset must be unique: $name" }
            if ($matches[0].state -ne 'uploaded' -or $matches[0].size -le 0) {
              throw "Asset is not uploaded correctly: $name"
            }
          }
          $remoteInstaller = @($release.assets | Where-Object { $_.name -ceq $env:ASSET_NAME })[0]
          if ($remoteInstaller.size -ne [int64]$env:ASSET_SIZE) { throw 'Remote installer size mismatch.' }
          if ($remoteInstaller.digest -and $remoteInstaller.digest -ne "sha256:$env:ASSET_SHA256") {
            throw "Remote installer digest mismatch: $($remoteInstaller.digest)"
          }
          $remoteChecksumAsset = @($release.assets | Where-Object { $_.name -ceq "$env:ASSET_NAME.sha256" })[0]
          $remoteChecksum = (gh api -H 'Accept: application/octet-stream' "repos/$env:GITHUB_REPOSITORY/releases/assets/$($remoteChecksumAsset.id)").Trim()
          if ($remoteChecksum -ne "$env:ASSET_SHA256  $env:ASSET_NAME") { throw 'Remote checksum content mismatch.' }

      - name: Publish Release
        if: env.SKIP_RELEASE != 'true'
        run: gh api -X PATCH "repos/$env:GITHUB_REPOSITORY/releases/$env:RELEASE_ID" -F draft=false -f make_latest=true

      - name: Verify Latest Release and Git refs
        if: env.SKIP_RELEASE != 'true'
        shell: pwsh
        run: |
          $latest = gh api "repos/$env:GITHUB_REPOSITORY/releases/latest" | ConvertFrom-Json
          if ($latest.tag_name -ne $env:TAG -or $latest.draft -or $latest.prerelease) {
            throw 'Latest Release state mismatch.'
          }
          if ($latest.target_commitish -ne $env:GITHUB_SHA) { throw 'Latest target commit mismatch.' }
          $asset = @($latest.assets | Where-Object { $_.name -ceq $env:ASSET_NAME })
          $checksum = @($latest.assets | Where-Object { $_.name -ceq "$env:ASSET_NAME.sha256" })
          if ($asset.Count -ne 1 -or $checksum.Count -ne 1) { throw 'Latest assets do not match updater contract.' }
          git fetch origin main --tags --force
          $branchSha = (git rev-parse origin/main).Trim()
          $tagSha = (git rev-list -n 1 $env:TAG).Trim()
          if ($branchSha -ne $env:GITHUB_SHA -or $tagSha -ne $env:GITHUB_SHA) {
            throw "Ref mismatch branch=$branchSha tag=$tagSha expected=$env:GITHUB_SHA"
          }

      - name: Clean up this run's draft on failure
        if: failure() && steps.create_release.outputs.created == 'true'
        shell: pwsh
        run: |
          $matches = @(gh api "repos/$env:GITHUB_REPOSITORY/releases?per_page=100" | ConvertFrom-Json | Where-Object {
            $_.tag_name -eq $env:TAG -and $_.draft -and $_.target_commitish -eq $env:GITHUB_SHA
          })
          if ($matches.Count -eq 1) {
            gh api -X DELETE "repos/$env:GITHUB_REPOSITORY/releases/$($matches[0].id)"
          }
          $remoteTag = git ls-remote origin "refs/tags/$env:TAG"
          if ($remoteTag) {
            $tagSha = ($remoteTag -split "`t")[0]
            if ($tagSha -eq $env:GITHUB_SHA) {
              git push origin ":refs/tags/$env:TAG"
            }
          }
