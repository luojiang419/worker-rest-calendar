<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>工作日历 · UI Style Guide</title>
<style>
:root{--blue:#3478f6;--green:#38b889;--orange:#f29a38;--purple:#8e7cf0;--red:#ef5b5b;--bg:#f5f5f7;--surface:#fff;--text:#1d1d1f;--sub:#6e6e73;--line:rgba(60,60,67,.12);--shadow:0 10px 30px rgba(20,35,60,.10),0 2px 8px rgba(20,35,60,.06)}
*{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text)}
main{max-width:1180px;margin:auto;padding:40px 24px 80px}.hero{display:flex;justify-content:space-between;align-items:end;gap:20px}.hero h1{font-size:40px;margin:0}.hero p{color:var(--sub)}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:28px}.panel{background:var(--surface);border:1px solid var(--line);border-radius:24px;padding:22px;box-shadow:var(--shadow)}
.card-title{font-size:14px;color:var(--sub)}.big{font-size:42px;font-weight:750;margin:8px 0}.green{color:var(--green)}.orange{color:var(--orange)}
.week{display:flex;gap:8px;margin-top:18px}.day{flex:1;text-align:center;padding:12px 4px;border-radius:14px;background:#f1f3f6;box-shadow:0 3px 8px rgba(30,40,60,.07)}.day.rest{background:#e7f7f0;color:#19865e}.day.work6{background:#fff0df;color:#b9650f}
.controls{display:flex;flex-wrap:wrap;gap:12px}.btn{border:0;border-radius:14px;padding:13px 18px;font-weight:650;box-shadow:0 7px 16px rgba(35,76,150,.18);cursor:pointer}.primary{background:var(--blue);color:white}.secondary{background:rgba(255,255,255,.75);color:var(--blue);border:1px solid var(--line)}.danger{background:var(--red);color:white}
.chip{display:inline-flex;border-radius:999px;padding:8px 12px;margin:5px;background:#eef2f7;color:#586174}.chip.rest{background:#e6f7ef;color:#17875d}.chip.adjust{background:#fff0df;color:#bd670e}.chip.leave{background:#f0edff;color:#6d58d9}
.dark{--bg:#0e1116;--surface:#171c23;--text:#f6f7f9;--sub:#a8b0bb;--line:rgba(255,255,255,.08);--shadow:0 14px 34px rgba(0,0,0,.48),inset 0 1px rgba(255,255,255,.035);background:var(--bg);color:var(--text);padding:28px;border-radius:30px;margin-top:30px}.dark .day{background:#222935}.dark .day.rest{background:#14382c}.dark .day.work6{background:#402a16}.dark .secondary{background:#202731;color:#8ab2ff}
@media(max-width:800px){.grid{grid-template-columns:1fr}.hero{align-items:start;flex-direction:column}.hero h1{font-size:32px}}
</style>
</head>
<body><main>
<section class="hero"><div><h1>工作日历</h1><p>浅色与暗黑模式组件参考；正式实现以 design_tokens.json 为准。</p></div><div class="chip rest">大周</div></section>
<section class="grid">
<div class="panel"><div class="card-title">今日状态</div><div class="big green">休息日</div><p>距离下次休息还有 <b>0 天</b></p></div>
<div class="panel"><div class="card-title">本周节奏 · 大周</div><div class="week"><div class="day">一<br>班</div><div class="day">二<br>班</div><div class="day">三<br>班</div><div class="day">四<br>班</div><div class="day">五<br>班</div><div class="day rest">六<br>休</div><div class="day rest">日<br>休</div></div></div>
<div class="panel"><div class="card-title">按钮与标签</div><div class="controls"><button class="btn primary">新增调休</button><button class="btn secondary">编辑</button><button class="btn danger">删除</button></div><p><span class="chip">工作</span><span class="chip rest">休息</span><span class="chip adjust">调休</span><span class="chip leave">请假</span></p></div>
</section>
<section class="dark">
<h2>暗黑模式</h2><div class="grid">
<div class="panel"><div class="card-title">今日状态</div><div class="big orange">上班日</div><p>再上 <b>2 天班</b></p></div>
<div class="panel"><div class="card-title">本周节奏 · 小周</div><div class="week"><div class="day">一<br>班</div><div class="day">二<br>班</div><div class="day">三<br>班</div><div class="day">四<br>班</div><div class="day">五<br>班</div><div class="day work6">六<br>班</div><div class="day rest">日<br>休</div></div></div>
<div class="panel"><div class="card-title">投影原则</div><p>深色外阴影、极弱高光描边、克制的状态色，不复用浅色灰影。</p></div>
</div></section>
</main></body></html>
