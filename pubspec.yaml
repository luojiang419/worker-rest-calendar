name: worker_rest_calendar
description: 一眼看懂今天上班还是休息的本地优先日历。
publish_to: none
version: 0.1.10+11

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  crypto: ^3.0.6
  drift: 2.31.0
  file_selector: ^1.1.0
  flutter:
    sdk: flutter
  flutter_local_notifications: ^22.0.1
  flutter_timezone: 5.1.0
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ">=3.0.0 <3.3.2"
  go_router: ^17.3.0
  home_widget: ^0.9.3
  intl: ^0.20.2
  launch_at_startup: ^0.5.1
  package_info_plus: ^8.3.1
  path: ^1.9.1
  path_provider: ^2.1.6
  shared_preferences: ^2.5.5
  screen_retriever: ^0.2.2
  sqlite3: 2.9.4
  sqlite3_flutter_libs: 0.5.41
  timezone: ^0.11.1
  tray_manager: 0.5.3
  uuid: ^4.5.3
  window_manager: ^0.5.2

dev_dependencies:
  build_runner: 2.7.1
  drift_dev: 2.31.0
  flutter_lints: ^6.0.0
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter
  test: 1.26.3

flutter:
  uses-material-design: true
  assets:
    - assets/holidays/cn_2026.json
    - assets/tray/app_icon.ico
